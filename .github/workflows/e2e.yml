name: e2e

# Single trigger on purpose: a workflow with more than one event in `on:` makes
# GitHub append the event name to the check context (e.g. "e2e / test (pull_request)"),
# which would not match a required check named "e2e / test". One event keeps the
# context exactly "e2e / test" (same reasoning as ci.yml).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        # emits ./out, which the tests serve locally

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
