name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only contents: read needed — no GitHub Pages permissions required
permissions:
  contents: read

# Cancel any in-flight deploy when a new push lands
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        # emits ./out

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Trust the server host key
        run: ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: rsync ./out to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            ./out/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/study-guide/"

      - name: Verify deployment (expect HTTP 200)
        run: |
          # The site redirects http -> https (301), so follow redirects (-L) and check the
          # final https response. Still strict: any non-200 fails the deploy.
          code=$(curl -sS -L -o /dev/null -w "%{http_code}" "https://${{ secrets.SITE_DOMAIN }}/")
          echo "Final HTTP status (after redirects): $code"
          if [ "$code" != "200" ]; then
            echo "ERROR: expected 200, got $code"
            exit 1
          fi
