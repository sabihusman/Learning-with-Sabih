# Exclude non-app directories from SonarCloud analysis:
#   data/    - reproducible SQL teaching dataset (seeded generator + fixtures);
#              random module use there is deliberate (seed=42), not security-sensitive
#   archive/ - historical prototypes and superseded audit drafts, kept for reference,
#              never shipped (also ignored in eslint.config.mjs)
sonar.exclusions=data/**,archive/**
