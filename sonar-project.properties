# SonarCloud analysis configuration (read by automatic analysis).
#
# The contents page is a uniform list of topic entries grouped into sections. Every
# entry has the same shape ({ num, title, subtitle, href }), so the section blocks are
# structurally identical and the copy-paste detector flags them as duplicates even
# though this is just data, not copy-pasted logic. Exclude it from duplication
# detection so adding a topic does not trip the quality gate.
sonar.cpd.exclusions=app/page.jsx
